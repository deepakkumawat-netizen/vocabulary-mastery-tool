services:
  - type: web
    name: vocabulary-mastery-tool
    env: python
    region: oregon
    plan: free
    buildCommand: python -m pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
